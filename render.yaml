services:
  - type: db
    name: cuadrilla_db
    databaseName: cuadrilla_sistema
    user: edwin_admin

  - type: web
    name: sistema-cuadrilla-cindy
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.5
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: DATABASE_URL
        fromDatabase:
          name: cuadrilla_db
          property: connectionString